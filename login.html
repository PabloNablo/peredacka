<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Корочки.Есть</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .justify-centert, .items-centert {
            justify-content: none !important;
            align-items: none !important;
        }

        .p-7 {
            justify-content: center;
            align-items: center;
            margin: 20rem auto 20rem auto;
        }

        .shadow-md {
            --tw-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --tw-shadow-colored: 0 4px 6px -1px var(--tw-shadow-color), 0 2px 4px -2px var(--tw-shadow-color);
            box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
        }

    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-centert justify-centert">
    <custom-navbar></custom-navbar>
    
    <div class="max-w-md w-full bg-white rounded-lg shadow-md p-7">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Вход в аккаунт</h1>
            <p class="text-gray-600">Введите ваши данные для входа</p>
        </div>

        <!-- Сообщения об ошибках -->
        <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded"></div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="email" name="email" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Пароль</label>
                <input type="password" id="password" name="password" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200">
                Войти
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-gray-600">
                Нет аккаунта? 
                <a href="register.html" class="text-blue-600 hover:text-blue-700 font-medium">Зарегистрируйтесь</a>
            </p>
        </div>
    </div>

    <custom-footer></custom-footer>
    <script src="pocketbase.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await pb.init();
            
            const loginForm = document.getElementById('loginForm');
            const errorDiv = document.getElementById('errorMessage');

            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
            }

            function hideError() {
                errorDiv.classList.add('hidden');
            }

            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideError();

                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                // Валидация
                if (!email || !password) {
                    showError('Пожалуйста, заполните все поля');
                    return;
                }

                if (!email.includes('@')) {
                    showError('Пожалуйста, введите корректный email');
                    return;
                }

                try {
                    // Показываем индикатор загрузки
                    const submitBtn = loginForm.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Вход...';
                    submitBtn.disabled = true;

                    await pb.login(email, password);
                    window.location.href = 'applications.html';
                    
                } catch (error) {
                    let errorMessage = 'Ошибка входа';
                    
                    if (error.message.includes('Неверный email или пароль')) {
                        errorMessage = 'Неверный email или пароль';
                    } else if (error.message.includes('Совпадают')) {
                        errorMessage = 'Ошибка соединения с сервером';
                    } else {
                        errorMessage = error.message;
                    }
                    
                    showError(errorMessage);
                    
                    // Восстанавливаем кнопку
                    const submitBtn = loginForm.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Войти';
                    submitBtn.disabled = false;
                }
            });

            loginForm.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', hideError);
            });
        });
    </script>
</body>
</html>
