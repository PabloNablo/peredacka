<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Корочки.Есть</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="components/navbar.js"></script>
    <script src="components/footer.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }

        .justify-centert, .items-centert {
            justify-content: none !important;
            align-items: none !important;
        }

        .p-7 {
            justify-content: center;
            align-items: center;
            margin: 10rem auto 10rem auto;
        }

        .shadow-md {
            --tw-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --tw-shadow-colored: 0 4px 6px -1px var(--tw-shadow-color), 0 2px 4px -2px var(--tw-shadow-color);
            box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow);
        }

    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-centert justify-centert">
    <custom-navbar></custom-navbar>
    
    <div class="max-w-md w-full bg-white rounded-lg shadow-md p-7">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-gray-900">Регистрация</h1>
            <p class="text-gray-600">Создайте аккаунт для доступа к курсам</p>
        </div>

        <!-- Сообщения об ошибках -->
        <div id="errorMessage" class="hidden mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded"></div>
        <div id="successMessage" class="hidden mb-4 p-3 bg-green-100 border border-green-400 text-green-700 rounded"></div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label for="fullName" class="block text-sm font-medium text-gray-700">ФИО *</label>
                <input type="text" id="fullName" name="fullName" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700">Имя пользователя *</label>
                <input type="text" id="username" name="username" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700">Email *</label>
                <input type="email" id="email" name="email" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="phone" class="block text-sm font-medium text-gray-700">Телефон *</label>
                <input type="tel" id="phone" name="phone" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700">Пароль *</label>
                <input type="password" id="password" name="password" required minlength="8"
                    class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
                <p class="mt-1 text-xs text-gray-500">Пароль должен содержать не менее 8 символов</p>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700">Подтвердите пароль *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 focus:border-blue-500 focus:ring-blue-500">
            </div>

            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200">
                Зарегистрироваться
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-gray-600">
                Уже есть аккаунт? 
                <a href="login.html" class="text-blue-600 hover:text-blue-700 font-medium">Войдите</a>
            </p>
        </div>
    </div>

    <custom-footer></custom-footer>
    <script src="pocketbase.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            await pb.init();
            
            const registerForm = document.getElementById('registerForm');
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            // Функция форматирования телефона
            function formatPhoneNumber(phone) {
                let cleaned = phone.replace(/\D/g, '');
                
                // Форматируем как 8 (000) 000-00-00
                if (cleaned.length === 11) {
                    return `8 (${cleaned.substring(1, 4)}) ${cleaned.substring(4, 7)}-${cleaned.substring(7, 9)}-${cleaned.substring(9)}`;
                } else if (cleaned.length === 10) {
                    return `8 (${cleaned.substring(0, 3)}) ${cleaned.substring(3, 6)}-${cleaned.substring(6, 8)}-${cleaned.substring(8)}`;
                }
                
                return phone;
            }

            // Обработчик ввода телефона
            const phoneInput = document.getElementById('phone');
            phoneInput.addEventListener('input', function(e) {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length > 0) {
                    if (value[0] === '7') value = '8' + value.substring(1);
                    if (value[0] !== '8') value = '8' + value;
                    
                    let formatted = '8 ';
                    if (value.length > 1) formatted += '(' + value.substring(1, 4);
                    if (value.length > 4) formatted += ') ' + value.substring(4, 7);
                    if (value.length > 7) formatted += '-' + value.substring(7, 9);
                    if (value.length > 9) formatted += '-' + value.substring(9, 11);
                    
                    e.target.value = formatted;
                }
            });

            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
                successDiv.classList.add('hidden');
            }

            function showSuccess(message) {
                successDiv.textContent = message;
                successDiv.classList.remove('hidden');
                errorDiv.classList.add('hidden');
            }

            function hideMessages() {
                errorDiv.classList.add('hidden');
                successDiv.classList.add('hidden');
            }

            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                hideMessages();

                const formData = {
                    name: document.getElementById('username').value.trim(), // name для имени пользователя
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value,
                    passwordConfirm: document.getElementById('confirmPassword').value,
                    FIO: document.getElementById('fullName').value.trim(),
                    telephone: formatPhoneNumber(document.getElementById('phone').value.trim()), // telephone для телефона
                    role: 'user'
                };

                // Валидация (ИСПРАВЛЕНО: используем telephone вместо Telephone)
                if (!formData.FIO || !formData.name || !formData.email || !formData.telephone) {
                    showError('Пожалуйста, заполните все обязательные поля');
                    return;
                }

                if (formData.password !== formData.passwordConfirm) {
                    showError('Пароли не совпадают!');
                    return;
                }

                if (formData.password.length < 8) { // Изменили с 6 на 8 символов
                    showError('Пароль должен быть не менее 8 символов');
                    return;
                }

                if (!formData.email.includes('@')) {
                    showError('Пожалуйста, введите корректный email');
                    return;
                }

                if (formData.telephone.replace(/\D/g, '').length < 11) {
                    showError('Пожалуйста, введите корректный номер телефона');
                    return;
                }

                try {
                    // Показываем индикатор загрузки
                    const submitBtn = registerForm.querySelector('button[type="submit"]');
                    const originalText = submitBtn.textContent;
                    submitBtn.textContent = 'Регистрация...';
                    submitBtn.disabled = true;

                    await pb.register(formData);
                    showSuccess('Регистрация успешна! Выполняется вход...');
                    
                    // Автоматический вход после регистрации
                    setTimeout(async () => {
                        try {
                            await pb.login(formData.email, formData.password);
                            window.location.href = 'applications.html';
                        } catch (loginError) {
                            showError('Ошибка автоматического входа: ' + loginError.message);
                            // Восстанавливаем кнопку
                            submitBtn.textContent = originalText;
                            submitBtn.disabled = false;
                        }
                    }, 1500);
                    
                } catch (error) {
                    let errorMessage = 'Ошибка регистрации';
                    
                    if (error.message.includes('email') && error.message.includes('invalid')) {
                        errorMessage = 'Некорректный email адрес';
                    } else if (error.message.includes('email') && error.message.includes('already')) {
                        errorMessage = 'Пользователь с таким email уже существует';
                    } else if (error.message.includes('name') && error.message.includes('already')) {
                        errorMessage = 'Пользователь с таким именем уже существует';
                    } else if (error.message.includes('Failed to fetch')) {
                        errorMessage = 'Ошибка соединения с сервером';
                    } else {
                        errorMessage = error.message;
                    }
                    
                    showError(errorMessage);
                    
                    // Восстанавливаем кнопку
                    const submitBtn = registerForm.querySelector('button[type="submit"]');
                    submitBtn.textContent = 'Зарегистрироваться';
                    submitBtn.disabled = false;
                }
            });

            // Скрываем сообщения при вводе
            registerForm.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', hideMessages);
            });

            // Валидация пароля в реальном времени
            const passwordInput = document.getElementById('password');
            passwordInput.addEventListener('input', function() {
                const password = this.value;
                if (password.length > 0 && password.length < 8) {
                    this.classList.add('border-red-500');
                    this.classList.remove('border-gray-300');
                } else {
                    this.classList.remove('border-red-500');
                    this.classList.add('border-gray-300');
                }
            });

            // Валидация подтверждения пароля в реальном времени
            const confirmPasswordInput = document.getElementById('confirmPassword');
            confirmPasswordInput.addEventListener('input', function() {
                const password = document.getElementById('password').value;
                const confirmPassword = this.value;
                
                if (confirmPassword.length > 0 && password !== confirmPassword) {
                    this.classList.add('border-red-500');
                    this.classList.remove('border-gray-300');
                } else {
                    this.classList.remove('border-red-500');
                    this.classList.add('border-gray-300');
                }
            });
        });
    </script>
</body>
</html>
